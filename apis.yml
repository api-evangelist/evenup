aid: evenup
name: EvenUp
description: >-
  EvenUp is a SaaS company building proactive AI for personal-injury law firms,
  spanning the full case lifecycle from intake and treatment management through
  demand drafting, negotiation, discovery, and trial support. The platform
  combines AI drafting, communication agents, medical record management,
  proactive workflows, and executive analytics on top of integrations with
  popular case-management systems. EvenUp reports serving more than 2,000
  personal-injury firms and processing roughly 10,000 cases per week, with
  more than $10B in damages claimed through the platform. The company is
  venture-funded (Series E) at a $2B+ valuation, with backing from Bessemer,
  B Capital, Bain Capital, Lightspeed, Premji Invest, and others. EvenUp does
  not publish a public developer portal; integrations are delivered through
  case-management partner connectors rather than a self-serve API.
